    <meta charset="UTF-8">
    <title>Dynamic To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

```
<div class="container">
    <h1>📝 To-Do List App</h1>
    <p>Manage your daily tasks efficiently. Add, edit, delete and mark tasks as completed.</p>

    <!-- Input Section -->
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task...">
        <button onclick="addTask()">Add Task</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Task Counter -->
    <div class="counter">
        <p>Total: <span id="total">0</span> | Completed: <span id="completed">0</span></p>
    </div>
</div>

<script src="script.js"></script>
```

</body>
</html>
